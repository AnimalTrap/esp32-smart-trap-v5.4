<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>動物管理遠端監控系統</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mqtt/4.3.7/mqtt.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
    
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #f0f2f5;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        h1 { color: #333; margin-bottom: 5px; font-size: 26px; text-align: center; }
        .subtitle { color: #6c757d; margin-bottom: 20px; font-size: 14px; }
        
        #main-map {
            width: 100%;
            max-width: 940px;
            height: 320px;
            background-color: #e5e3df;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.15);
            margin-bottom: 25px;
        }

        .container {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            justify-content: center;
            width: 100%;
            max-width: 1200px;
        }

        .card {
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            padding: 15px;
            width: 290px;
            box-sizing: border-box;
            text-align: center;
            border-top: 8px solid #6c757d;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .card.status-armed { border-top-color: #28a745; background-color: #f8fff9; }
        .card.status-triggered { border-top-color: #dc3545; background-color: #fff5f5; animation: blink 1s infinite; }
        
        .status-box { width: 100%; margin-bottom: 12px; }
        .status-text { font-size: 18px; font-weight: bold; margin: 8px 0; color: #495057; }
        .time-text { font-size: 11px; color: #6c757d; background: #eee; padding: 2px 6px; border-radius: 4px; display: inline-block; }

        .mini-map {
            width: 100%;
            height: 140px;
            background-color: #e5e3df;
            border-radius: 8px;
            border: 1px solid #ccc;
            margin-top: 10px;
        }

        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.7; } 100% { opacity: 1; } }
    </style>
</head>
<body>

    <h1>📋 動物管理即時狀態面版 (Demo)</h1>
    <div class="subtitle">定位地點：長沙灣政府合署 (Cheung Sha Wan Government Offices)</div>

    <div id="main-map"></div>

    <div class="container">
        <div id="trap-01" class="card">
            <div class="status-box">
                <h2>🪤 Trap #01 </h2>
                <div id="status-01" class="status-text">Waiting for Signal...</div>
                <div id="time-01" class="time-text">最後更新: --:--:--</div>
            </div>
            <div id="mini-map-01" class="mini-map"></div>
        </div>

        <div id="trap-02" class="card status-triggered">
            <div class="status-box">
                <h2>🪤 Trap #02 </h2>
                <div id="status-02" class="status-text" style="color: #dc3545;">🚨 Triggered！</div>
                <div id="time-02" class="time-text">最後更新: --:--:--</div>
            </div>
            <div id="mini-map-02" class="mini-map"></div>
        </div>

        <div id="trap-03" class="card status-armed">
            <div class="status-box">
                <h2>🪤 Trap #03 </h2>
                <div id="status-03" class="status-text">✅ Armed</div>
                <div id="time-03" class="time-text">最後更新: --:--:--</div>
            </div>
            <div id="mini-map-03" class="mini-map"></div>
        </div>
    </div>

    <script>
        const initTime = new Date().toLocaleTimeString();
        document.getElementById("time-02").innerText = `最後更新: ${initTime}`;
        document.getElementById("time-03").innerText = `最後更新: ${initTime}`;

        // 📍 🌟 修正後的極精準大樓核心座標
        const cswGovLat = 22.33085; 
        const cswGovLng = 114.16055;
        
        // 讓 3 個陷阱散落在大樓的東南西北不同角落，展現精準度
        const loc01 = [cswGovLat, cswGovLng];                   // 大樓中心
        const loc02 = [cswGovLat + 0.00012, cswGovLng + 0.00012]; // 大樓東北角
        const loc03 = [cswGovLat - 0.00012, cswGovLng - 0.00012]; // 大樓西南角

        const tileLayerUrl = 'https://b.tile.openstreetmap.org/{z}/{x}/{y}.png';

        window.addEventListener('DOMContentLoaded', () => {
            setTimeout(() => {
                try {
                    if (typeof L !== 'undefined') {
                        // 🌟 修正：將初始縮放從 17 放大到 19（Leaflet 最大清晰度）
                        const mainMap = L.map('main-map').setView([cswGovLat, cswGovLng], 19);
                        L.tileLayer(tileLayerUrl, { maxZoom: 19 }).addTo(mainMap);

                        const mainMarker01 = L.marker(loc01).addTo(mainMap).bindPopup("<b>陷阱 #01 (實體)</b>");
                        
                        // 2 號預設彈出警告
                        const mainMarker02 = L.marker(loc02).addTo(mainMap).bindPopup("<b>🪤 陷阱 #02 (模擬)</b><br><span style='color:red;'>🚨 已經觸發！</span>").openPopup();
                        
                        L.marker(loc03).addTo(map = mainMap).bindPopup("<b>陷阱 #03 (模擬)</b>");

                        // 初始化迷你地圖 (同步放大到 19，可以看清街道與大樓切面)
                        const miniOpts = { attributionControl: false, zoomControl: false, dragging: false, scrollWheelZoom: false };
                        
                        const m1 = L.map('mini-map-01', miniOpts).setView(loc01, 19);
                        L.tileLayer(tileLayerUrl, { maxZoom: 19 }).addTo(m1); L.marker(loc01).addTo(m1);

                        const m2 = L.map('mini-map-02', miniOpts).setView(loc02, 19);
                        L.tileLayer(tileLayerUrl, { maxZoom: 19 }).addTo(m2); L.marker(loc02).addTo(m2);

                        const m3 = L.map('mini-map-03', miniOpts).setView(loc03, 19);
                        L.tileLayer(tileLayerUrl, { maxZoom: 19 }).addTo(m3); L.marker(loc03).addTo(m3);

                        // 強制刷新尺寸
                        setTimeout(() => {
                            mainMap.invalidateSize(); m1.invalidateSize(); m2.invalidateSize(); m3.invalidateSize();
                        }, 300);

                        setupMQTT(mainMarker01);
                    } else {
                        setupMQTT(null);
                    }
                } catch (err) {
                    console.error("地圖載入出錯:", err);
                    setupMQTT(null);
                }
            }, 300);
        });

        function setupMQTT(mainMarker01) {
            try {
                if (typeof mqtt === 'undefined') return;
                const options = {
                    connectTimeout: 4000,
                    clientId: 'phone_demo_map_' + Math.random().toString(16).substr(2, 8),
                    keepalive: 60,
                    clean: true,
                };

                const client = mqtt.connect('wss://broker.emqx.io:8084/mqtt', options);

                client.on('connect', () => {
                    client.subscribe('hk_trap_2026_xyz9527/status');
                });

                client.on('message', (topic, payload) => {
                    const message = payload.toString();
                    if (message.toUpperCase() === "PING") return;

                    const cardElement = document.getElementById("trap-01");
                    const statusElement = document.getElementById("status-01");
                    const timeElement = document.getElementById("time-01");
                    const now = new Date().toLocaleTimeString();
                    
                    timeElement.innerText = `最後更新: ${now}`;

                    if (message.toUpperCase().includes("TRIGGERED") || message.toUpperCase().includes("WARNING")) {
                        statusElement.innerText = "🚨 已經觸發！";
                        cardElement.className = "card status-triggered"; 
                        if (mainMarker01) mainMarker01.setPopupContent("<b>🪤 陷阱 #01 (實體)</b><br><span style='color:red;'>🚨 已經觸發！</span>").openPopup();
                    } 
                    else if (message.toUpperCase().includes("ARMED") || message.toUpperCase().includes("STATUS")) {
                        statusElement.innerText = "✅ 安全佈防中";
                        cardElement.className = "card status-armed"; 
                        if (mainMarker01) mainMarker01.setPopupContent("<b>🪤 陷阱 #01 (實體)</b><br><span style='color:green;'>✅ 安全佈防中</span>");
                    }
                });
            } catch (mqttErr) {
                console.error("MQTT 錯誤:", mqttErr);
            }
        }
    </script>
</body>
</html>
