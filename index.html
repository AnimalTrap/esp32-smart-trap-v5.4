<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>野外陷阱 3 合 1 遠端監控系統</title>
    
    <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #f0f2f5;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        h1 { color: #333; margin-bottom: 5px; font-size: 26px; text-align: center; }
        .subtitle { color: #6c757d; margin-bottom: 20px; font-size: 14px; }
        
        /* 🗺️ 大地圖樣式 */
        #main-map {
            width: 100%;
            max-width: 940px;
            height: 300px;
            background-color: #e5e3df; /* 預設灰色地圖背景 */
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.15);
            margin-bottom: 25px;
        }

        .container {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            justify-content: center;
            width: 100%;
            max-width: 1200px;
        }

        /* 🪤 卡片樣式 */
        .card {
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            padding: 15px;
            width: 290px;
            box-sizing: border-box;
            text-align: center;
            border-top: 8px solid #6c757d;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .card.status-armed { border-top-color: #28a745; background-color: #f8fff9; }
        .card.status-triggered { border-top-color: #dc3545; background-color: #fff5f5; animation: blink 1s infinite; }
        
        .status-box { width: 100%; margin-bottom: 12px; }
        .status-text { font-size: 18px; font-weight: bold; margin: 8px 0; color: #495057; }
        .time-text { font-size: 11px; color: #6c757d; background: #eee; padding: 2px 6px; border-radius: 4px; display: inline-block; }

        /* 📍 迷你地圖樣式 */
        .mini-map {
            width: 100%;
            height: 140px;
            background-color: #e5e3df;
            border-radius: 8px;
            border: 1px solid #ccc;
            margin-top: 10px;
        }

        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.7; } 100% { opacity: 1; } }
    </style>
</head>
<body>

    <h1>📋 野外陷阱即時狀態面版 (Demo)</h1>
    <div class="subtitle">定位地點：長沙灣政府合署 (Cheung Sha Wan Government Offices)</div>

    <div id="main-map"></div>

    <div class="container">
        <div id="trap-01" class="card">
            <div class="status-box">
                <h2>🪤 陷阱 #01 (真實)</h2>
                <div id="status-01" class="status-text">等待實體訊號...</div>
                <div id="time-01" class="time-text">最後更新: --:--:--</div>
            </div>
            <div id="mini-map-01" class="mini-map"></div>
        </div>

        <div id="trap-02" class="card status-armed">
            <div class="status-box">
                <h2>🪤 陷阱 #02 (模擬)</h2>
                <div id="status-02" class="status-text">✅ 安全佈防中</div>
                <div id="time-02" class="time-text">最後更新: --:--:--</div>
            </div>
            <div id="mini-map-02" class="mini-map"></div>
        </div>

        <div id="trap-03" class="card status-armed">
            <div class="status-box">
                <h2>🪤 陷阱 #03 (模擬)</h2>
                <div id="status-03" class="status-text">✅ 安全佈防中</div>
                <div id="time-03" class="time-text">最後更新: --:--:--</div>
            </div>
            <div id="mini-map-03" class="mini-map"></div>
        </div>
    </div>

    <script>
        // 1. 初始化靜態 Dummy 時間資料 (即使沒連網也能跑
